<!doctype html><html><head><meta charset="utf-8"><title>The Badge Collective - logo exports</title>
<style>body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f4f4f6;color:#111}
h1{font-weight:500;padding:24px 28px 0}p{padding:0 28px;color:#555}
.grid{display:flex;flex-wrap:wrap;gap:20px;padding:20px 28px}
.tile{background:#fff;border:1px solid #ddd;border-radius:12px;overflow:hidden;width:420px}
.tile .frame{display:flex;align-items:center;justify-content:center;padding:26px;min-height:150px}
.tile .lbl{font-size:13px;color:#555;padding:10px 16px;border-top:1px solid #eee}
img{max-width:100%;height:auto}</style></head><body>
<h1>The Badge Collective — logo files</h1>
<p>SVGs are self-contained (silhouette embedded). PNGs have transparent backgrounds.</p>
<div class="grid">
 <div class="tile"><div class="frame" style="background:#fff"><img src="logo-primary.svg" style="width:340px"></div><div class="lbl">logo-primary.svg</div></div>
 <div class="tile"><div class="frame" style="background:#0c0e12"><img src="logo-reversed.svg" style="width:340px"></div><div class="lbl">logo-reversed.svg</div></div>
 <div class="tile"><div class="frame" style="background:#cdd2d8"><img src="logo-badge.svg" style="width:150px"></div><div class="lbl">logo-badge.svg</div></div>
 <div class="tile"><div class="frame" style="background:#fff;background-image:linear-gradient(45deg,#eee 25%,transparent 25%,transparent 75%,#eee 75%),linear-gradient(45deg,#eee 25%,transparent 25%,transparent 75%,#eee 75%);background-size:20px 20px;background-position:0 0,10px 10px"><img src="silhouette-black.png" style="width:300px"></div><div class="lbl">silhouette-black.png (transparent)</div></div>
 <div class="tile"><div class="frame" style="background:#0c0e12"><img src="silhouette-white.png" style="width:300px"></div><div class="lbl">silhouette-white.png (transparent)</div></div>
</div></body></html>
